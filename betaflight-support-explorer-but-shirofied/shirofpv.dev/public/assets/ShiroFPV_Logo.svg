<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d7b7ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8fd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfe9ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circuit board pattern -->
  <rect width="200" height="200" rx="20" fill="rgba(22,11,38,0.8)" stroke="url(#logoGrad)" stroke-width="2"/>
  <!-- PCB traces -->
  <line x1="40" y1="100" x2="80" y2="100" stroke="url(#logoGrad)" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="100" x2="160" y2="100" stroke="url(#logoGrad)" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="40" x2="100" y2="80" stroke="url(#logoGrad)" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="120" x2="100" y2="160" stroke="url(#logoGrad)" stroke-width="2" opacity="0.6"/>
  <!-- Center chip -->
  <rect x="70" y="70" width="60" height="60" rx="8" fill="rgba(180,139,255,0.15)" stroke="url(#logoGrad)" stroke-width="1.5"/>
  <!-- Chip pins -->
  <rect x="60" y="80" width="10" height="6" rx="2" fill="url(#logoGrad)" opacity="0.7"/>
  <rect x="60" y="95" width="10" height="6" rx="2" fill="url(#logoGrad)" opacity="0.7"/>
  <rect x="60" y="110" width="10" height="6" rx="2" fill="url(#logoGrad)" opacity="0.7"/>
  <rect x="130" y="80" width="10" height="6" rx="2" fill="url(#logoGrad)" opacity="0.7"/>
  <rect x="130" y="95" width="10" height="6" rx="2" fill="url(#logoGrad)" opacity="0.7"/>
  <rect x="130" y="110" width="10" height="6" rx="2" fill="url(#logoGrad)" opacity="0.7"/>
  <!-- S logo center -->
  <text x="100" y="108" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="url(#logoGrad)">S</text>
  <!-- Corner dots -->
  <circle cx="40" cy="40" r="4" fill="url(#logoGrad)" opacity="0.5"/>
  <circle cx="160" cy="40" r="4" fill="url(#logoGrad)" opacity="0.5"/>
  <circle cx="40" cy="160" r="4" fill="url(#logoGrad)" opacity="0.5"/>
  <circle cx="160" cy="160" r="4" fill="url(#logoGrad)" opacity="0.5"/>
</svg>
