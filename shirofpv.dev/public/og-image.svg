<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#160d28"/>
      <stop offset="100%" stop-color="#0a0713"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b48bff"/>
      <stop offset="50%" stop-color="#ff8fd4"/>
      <stop offset="100%" stop-color="#7dd3ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#b48bff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#b48bff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- top accent line -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#brand)"/>

  <!-- badge -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="300" height="44" rx="22" fill="#ffffff" fill-opacity="0.06" stroke="#b48bff" stroke-opacity="0.35"/>
    <circle cx="26" cy="22" r="5" fill="#ff8fd4"/>
    <text x="46" y="29" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#d7b7ff">OPEN-SOURCE FPV HARDWARE</text>
  </g>

  <!-- title -->
  <text x="98" y="330" font-family="Inter, Arial, sans-serif" font-size="120" font-weight="900" fill="url(#brand)">ShiroFPV</text>

  <!-- tagline -->
  <text x="100" y="400" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="400" fill="#e2d6f5">Flight controllers, firmware &amp; FC debugging guides.</text>
  <text x="100" y="448" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="400" fill="#9a86b8">Open-source, because hoarding schematics is cringe.</text>

  <!-- url -->
  <text x="100" y="545" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#7dd3ff">shirofpv.dev</text>
</svg>
